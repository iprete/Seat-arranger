<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>자리배치표 - Poop Edition</title>
  <style>
    body{font-family:sans-serif;background:#f4f7f6;margin:0;padding:20px;display:flex;flex-direction:column;align-items:center}
    .container{background:#fff;padding:20px;border-radius:10px;box-shadow:0 4px 6px rgba(0,0,0,.1);width:100%;max-width:800px}
    h1{text-align:center;color:#333;font-size:22px}
    .input-group{margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
    .input-group label{flex:1;font-size:13px;color:#555}
    .input-group input{flex:2;padding:8px;border:1px solid #ddd;border-radius:5px}
    .buttons{display:flex;justify-content:center;gap:10px;margin:20px 0}
    button{padding:10px 18px;border:none;border-radius:5px;background:#8b4513;color:#fff;cursor:pointer;font-weight:bold}
    button:hover{background:#5d2e0a}
    button:disabled{background:#ccc}
    #gridArea{margin-top:20px;display:flex;justify-content:center;overflow-x:auto}
    table{border-collapse:collapse}
    td{border:1px solid #ccc;width:55px;height:45px;text-align:center;vertical-align:middle;cursor:pointer;font-size:14px;font-weight:700}
    .desk-td{background:#6c757d;color:#fff;cursor:default}
    .excluded{background:#ff6b6b;color:#fff}
    #loadingContainer{display:none;width:100%;background:#eee;height:8px;margin:10px 0;border-radius:4px}
    #loadingBar{width:0;height:100%;background:#4caf50;transition:width .1s}
  </style>
</head>
<body>
  <div class="container">
    <h1>Poop Optimizer v1.0</h1>
    <div class="input-group"><label>인원 수</label><input id="poop_num" type="number" value="30" /></div>
    <div class="input-group"><label>행 수</label><input id="poop_row" type="number" value="6" /></div>
    <div class="input-group"><label>앞자리</label><input id="poop_front" type="text" value="1,2,3" /></div>
    <div class="input-group"><label>뒷자리</label><input id="poop_back" type="text" value="28,29,30" /></div>
    <div class="buttons">
      <button onclick="boop.init()">판 깔기</button>
      <button id="boop_btn" onclick="boop.run()">똥 뿌리기(배치)</button>
    </div>
    <div id="loadingContainer"><div id="loadingBar"></div></div>
    <div id="gridArea"></div>
  </div>

  <script>
    const poopi = document, poppi = Math;
    const boop = {
      pooop: [], boob: new Set(), boobi: !1,
      init() {
        const p1 = parseInt(poopi.getElementById('poop_num').value), p2 = parseInt(poopi.getElementById('poop_row').value);
        if(!p1 || !p2) return; this.pooop = []; this.boob.clear();
        let h = '<table><tr><td class="desk-td" colspan="'+poppi.ceil(p1/p2)+'">교탁</td></tr>';
        for(let i=0; i<p2; i++) {
          h += '<tr>'; let a = [];
          for(let j=0; j<poppi.ceil(p1/p2); j++) {
            const id = `p${i}o${j}`; a.push(id); h += `<td id="${id}" onclick="boop.toggle('${id}')">-</td>`;
          }
          this.pooop.push(a); h += '</tr>';
        }
        poopi.getElementById('gridArea').innerHTML = h + '</table>';
      },
      toggle(id) {
        const el = poopi.getElementById(id);
        if(this.boob.has(id)) { this.boob.delete(id); el.classList.remove('excluded'); }
        else { this.boob.add(id); el.classList.add('excluded'); el.textContent = '-'; }
      },
      async run() {
        if(this.boobi) return; this.boobi = !0; poopi.getElementById('boop_btn').disabled = !0;
        const p_n = parseInt(poopi.getElementById('poop_num').value);
        const f_a = poopi.getElementById('poop_front').value.split(',').map(x=>x.trim());
        const b_a = poopi.getElementById('poop_back').value.split(',').map(x=>x.trim());
        let s = []; this.pooop.forEach((r,ri)=>r.forEach((c,ci)=>{ if(!this.boob.has(c)) s.push({r:ri,c:ci,id:c}) }));
        if(s.length !== p_n) { alert('인원수 안맞음!'); this.boobi = !1; poopi.getElementById('boop_btn').disabled = !1; return; }
        
        poopi.getElementById('loadingContainer').style.display = 'block';
        let p_list = Array.from({length: 40}, () => {
          let a = Array.from({length: p_n}, (_,i) => (i+1).toString());
          for(let i=a.length-1; i>0; i--) { const j=poppi.floor(poppi.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
          return { m: a, f: 0 };
        });

        for(let g=0; g<20; g++) {
          p_list.forEach(p => p.f = this.calc(p.m, s, f_a, b_a));
          p_list.sort((a,b) => b.f - a.f);
          let n_p = p_list.slice(0, 8);
          while(n_p.length < 40) {
            const p1 = p_list[poppi.floor(poppi.random()*10)], p2 = p_list[poppi.floor(poppi.random()*10)];
            let child = [...p1.m]; if(poppi.random() < 0.5) { const i1=poppi.floor(poppi.random()*p_n), i2=poppi.floor(poppi.random()*p_n); [child[i1],child[i2]]=[child[i2],child[i1]]; }
            n_p.push({ m: child, f: 0 });
          }
          p_list = n_p; poopi.getElementById('loadingBar').style.width = ((g+1)/20*100)+'%';
          await new Promise(r => setTimeout(r, 10));
        }
        p_list.sort((a,b) => b.f - a.f);
        s.forEach((x, i) => poopi.getElementById(x.id).textContent = p_list[0].m[i]);
        poopi.getElementById('loadingContainer').style.display = 'none'; this.boobi = !1; poopi.getElementById('boop_btn').disabled = !1;
      },
      calc(m_arr, s_pos, f, b) {
        let sc = 0; const cM = poppi.max(...this.pooop.map(r=>r.length));
        m_arr.forEach((p, i) => {
          const st = s_pos[i];
          const is_special = (st.r === 3 || st.r === 4) && (st.c >= cMax - 5 && st.c <= cMax - 3);
          if(p === '6' && (st.r === 3 || st.r === 4) && (st.c >= cM - 5 && st.c <= cM - 3)) sc += 99999;
          if(f.includes(p)) { if(st.r < 3) sc += 100; else if(p !== '6') sc -= 500; }
          if(b.includes(p) && st.r > 3) sc += 50;
        });
        return sc;
      }
    };
  </script>
</body>
</html>
